function fyKey(period){
  const [y,m] = period.split('-').map(Number);
  return m>=7 ? `FY${y+1}` : `FY${y}`;
}
function num(v, d){ const n = Number(v); return isNaN(n) ? (d||0) : n; }
function pick(liveArr, fallbackArr){ return (Array.isArray(liveArr) && liveArr.length) ? liveArr : fallbackArr; }
function stats(arr){
  const n = arr.length || 1;
  const mean = arr.reduce((a,b)=>a+b,0)/n;
  const variance = arr.reduce((a,b)=>a+Math.pow(b-mean,2),0)/n;
  const sd = Math.sqrt(variance);
  return {mean, sd, cov: mean!==0 ? Math.abs(sd/mean) : null};
}
function computeFY(monthlyArr){

    out[k].wallet_mechanic += Math.abs(r.wallet_mechanic||0);
  });

}

    return {period:r.period, clean_revenue, wallet_mechanic, total_expense, other_income, net_result,

}

async function loadLiveData(){
  const badge = document.getElementById('liveStatus');
  try{
    const res = await fetch('/api/aasl-data');
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    LIVE = data;
    if(Array.isArray(data.monthly) && data.monthly.length){
      monthly = deriveMonthlyFromLive(data.monthly);
      fy = computeFY(monthly);
    }
    if(badge) badge.textContent = 'LIVE · synced ' + new Date(data.meta.generatedAt).toLocaleString();
    go(currentGroupId);
  }catch(e){
    if(badge) badge.textContent = 'STATIC SNAPSHOT · DB unreachable';
    console.error('Live data fetch failed, showing static snapshot', e);
  }
}

function fmt(n){
  const v = Math.round(n);
  const s = Math.abs(v).toLocaleString('en-US');
  return (v<0? '('+s+')' : s);
}
function cls(n){ return n<0 ? 'neg' : (n>0?'pos':''); }

function renderNav(activeId){
  const nav = document.getElementById('nav');
  let lastSegment = null;
  nav.innerHTML = groups.map(g=>{
    let prefix = '';
    if(g.segment !== lastSegment){
      prefix = `<div class="segment-label" style="${lastSegment?'margin-top:18px;':''}">${g.segment}</div>`;
      lastSegment = g.segment;
    }
    const disabled = g.status==='pending' ? 'disabled' : '';
    const active = g.id===activeId ? 'active' : '';
    return `${prefix}<div class="navitem ${active} ${disabled}" onclick="${g.status==='done'?`go(${g.id})`:''}">
      <span class="num">${g.roman}</span>
      <span>${g.title}${g.status==='pending'?' — pending':''}</span>
    </div>`;
  }).join('');
}

function renderChart(){
  const w=1080, h=260, padL=50, padB=26, padT=10;
  const vals = monthly.map(r=>r.net_result);
  const max = Math.max(...vals, 0);
  const min = Math.min(...vals, 0);
  const range = max-min || 1;
  const barW = (w-padL-20)/monthly.length;
  const zeroY = padT + (max/range)*(h-padT-padB);

  let bars = monthly.map((r,i)=>{
    const x = padL + i*barW;
    const barH = Math.abs(r.net_result)/range*(h-padT-padB);
    const y = r.net_result>=0 ? zeroY-barH : zeroY;
    const color = r.net_result>=0 ? '#7FBF98' : '#A5432F';
    return `<rect x="${x+1}" y="${y}" width="${barW-2}" height="${Math.max(barH,1)}" fill="${color}" opacity="0.85"/>`;
  }).join('');

  let labels = monthly.map((r,i)=>{
    if(i%3!==0) return '';
    const x = padL + i*barW + barW/2;
    return `<text x="${x}" y="${h-8}" font-size="9" fill="#8FA1B8" text-anchor="middle">${r.period.slice(2)}</text>`;
  }).join('');

  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}">
    <line x1="${padL}" y1="${zeroY}" x2="${w-10}" y2="${zeroY}" stroke="#B8933F" stroke-width="1"/>
    ${bars}
    ${labels}
    <text x="${padL}" y="14" font-size="10" fill="#8FA1B8">Monthly Net Result (BDT), Feb 2024 — Jul 2026</text>
  </svg>`;
}

function budgetMeta(){
  return (LIVE && LIVE.budget && LIVE.budget.header) ? LIVE.budget.header : FALLBACK_BUDGET_META;
}
function budgetMonthlyRaw(){
  return (LIVE && LIVE.budget && Array.isArray(LIVE.budget.monthly) && LIVE.budget.monthly.length) ? LIVE.budget.monthly : FALLBACK_BUDGET_MONTHLY;
}
function deriveBudgetMonth(m){
  const sellingTotal = num(m.sellingFixed) + num(m.sellingCommission);
  const ebit = num(m.revenue) + sellingTotal + num(m.marketing) + num(m.admin) + num(m.depreciation);
  const ebt = ebit + num(m.financial);
  const netIncome = ebt + num(m.tax);
  return {...m, sellingTotal, ebit, ebt, netIncome};
}
function budgetMonthly(){
  return budgetMonthlyRaw().map(deriveBudgetMonth).sort((a,b)=>a.month-b.month);
}
function budgetSum(rows, field){ return rows.reduce((a,r)=>a+num(r[field]),0); }
function monthLabel(m){ return MONTH_LABELS[(m-1+12)%12]; }

function renderBudgetBarChart(rows, field, title){
  const w=1080, h=220, padL=50, padB=26, padT=10;
  const vals = rows.map(r=>r[field]);
  const max = Math.max(...vals, 0);
  const min = Math.min(...vals, 0);
  const range = max-min || 1;
  const barW = (w-padL-20)/rows.length;
  const zeroY = padT + (max/range)*(h-padT-padB);
  const bars = rows.map((r,i)=>{
    const x = padL + i*barW;
    const barH = Math.abs(r[field])/range*(h-padT-padB);
    const y = r[field]>=0 ? zeroY-barH : zeroY;
    const color = r[field]>=0 ? '#7FBF98' : '#A5432F';
    return `<rect x="${x+1}" y="${y}" width="${barW-2}" height="${Math.max(barH,1)}" fill="${color}" opacity="0.85"/>`;
  }).join('');
  const labels = rows.map((r,i)=>{
    const x = padL + i*barW + barW/2;
    return `<text x="${x}" y="${h-8}" font-size="9" fill="#8FA1B8" text-anchor="middle">${monthLabel(r.month)}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}">
    <line x1="${padL}" y1="${zeroY}" x2="${w-10}" y2="${zeroY}" stroke="#B8933F" stroke-width="1"/>
    ${bars}${labels}
    <text x="${padL}" y="14" font-size="10" fill="#8FA1B8">${title}</text>
  </svg>`;
}

function renderTwoBarChart(items){
  const w=600, barH=28, gap=14, padL=140, padR=60, padT=10;
  const maxW = w-padL-padR;
  const maxVal = Math.max(...items.map(i=>i.value));
  const h = padT*2 + items.length*(barH+gap) - gap;
  const bars = items.map((it,i)=>{
    const y = padT + i*(barH+gap);
    const bw = Math.max((it.value/maxVal)*maxW, 3);
    return `<text x="${padL-10}" y="${y+barH/2+4}" text-anchor="end" font-size="12" fill="#DCE3EC">${it.label}</text>
      <rect x="${padL}" y="${y}" width="${bw}" height="${barH}" rx="4" fill="${STRAT_ACCENT}" opacity="${it.opacity||1}"/>
      <text x="${padL+bw+8}" y="${y+barH/2+4}" font-size="12" fill="#F4F2ED" font-weight="bold">${it.text}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}">${bars}</svg>`;
}

function renderGroup12(){
  const rows = budgetMonthly();
  const revenue = budgetSum(rows,'revenue');
  const fixedTotal = budgetSum(rows,'sellingFixed')+budgetSum(rows,'marketing')+budgetSum(rows,'admin')+budgetSum(rows,'financial')+budgetSum(rows,'depreciation');
  const commissionTotal = budgetSum(rows,'sellingCommission');
  const commissionRatio = revenue ? Math.abs(commissionTotal)/revenue : 0;
  const taxRatio = revenue ? Math.abs(budgetSum(rows,'tax'))/revenue : 0;
  const breakeven = (1 - commissionRatio - taxRatio) ? Math.abs(fixedTotal)/(1 - commissionRatio - taxRatio) : null;
  const ebit = budgetSum(rows,'ebit');
  const financial = budgetSum(rows,'financial');
  const coverage = financial ? (ebit/Math.abs(financial)) : null;

  document.getElementById('main').innerHTML = `

      <tr><td>5</td><td style="text-align:left; white-space:normal; font-family:'Iowan Old Style',Georgia,serif; font-size:13px;">Budgeted revenue (${fmt(revenue)}) sits below the calculated breakeven point (~${breakeven?fmt(breakeven):'n/a'}) — meaning even before any adverse variance, the budget itself is not breakeven-achieving.</td></tr>

function renderStrategyPanel(segLabel, scores){
  const w = 360, barH = 18, gap = 8, padL = 92, padR = 34, padT = 6;

// Directly measured 2026-07-06 via curl/WebFetch against each live homepage — see footnote for method per metric.
const AUDIT_DIMENSIONS = [
  {key:'seo', label:'SEO & Social Metadata'},
  {key:'security', label:'Security Headers'},
  {key:'weight', label:'Homepage Payload Weight'},
  {key:'booking', label:'Booking Engine Breadth'},
];
const AUDIT_SCORES = {
  'Akij Air': {seo:2, security:4, weight:1, booking:4},
  ShareTrip:  {seo:5, security:2, weight:2, booking:5},
  GoZayaan:   {seo:1, security:2, weight:5, booking:5},
  Amy:        {seo:3, security:3, weight:4, booking:4},
  Triplover:  {seo:1, security:1, weight:3, booking:4},
};

function renderAuditChart(){
  const panels = AUDIT_DIMENSIONS.map(dim=>{
    const scores = {};
    Object.keys(AUDIT_SCORES).forEach(company=>{ scores[company] = AUDIT_SCORES[company][dim.key]; });
    return renderStrategyPanel(dim.label, scores);
  }).join('');
  return `
    <div style="display:flex; align-items:center; gap:20px; margin-bottom:16px; font-size:12px; color:#DCE3EC; flex-wrap:wrap;">
      <span style="display:flex; align-items:center; gap:6px;"><span style="width:12px;height:12px;border-radius:3px;background:${STRAT_ACCENT};display:inline-block;"></span> akijair.com</span>
      <span style="display:flex; align-items:center; gap:6px;"><span style="width:12px;height:12px;border-radius:3px;background:${STRAT_MUTED};display:inline-block;opacity:.8;"></span> Competitor sites — ShareTrip, GoZayaan, Amy, Triplover</span>
    </div>
    <div style="display:flex; flex-wrap:wrap; gap:28px 32px;">${panels}</div>
  `;
}

function renderGroup14(){
  document.getElementById('main').innerHTML = `

      <span class="eyebrow">Growth Strategy · XII</span>
      <h1>Website Audit: akijair.com</h1>
      <div class="entity">Measured live against ShareTrip, GoZayaan, Amy, Triplover · 2026-07-06</div>
    </div>

    <div class="callout">
      <span class="tag">Methodology</span>
      <p>Every finding below was measured directly against the live homepages (HTTP headers, page source, response size/timing via curl and a full page fetch) on 2026-07-06 — not a generic checklist. Scores (0–5 per dimension) combine what was actually measured; where competitor internals couldn't be verified the same way (e.g. booking-engine breadth), the score is drawn from the public research already compiled in Group XI, not fabricated.</p>
    </div>

    <div class="kpi-row">
      <div class="kpi"><div class="label">Homepage document size</div><div class="value">497 KB</div></div>
      <div class="kpi"><div class="label">+ Eagerly preloaded hero images</div><div class="value neg">~4.1 MB</div></div>
      <div class="kpi"><div class="label">Open Graph / JSON-LD tags found</div><div class="value neg">0</div></div>
      <div class="kpi"><div class="label">Security header posture</div><div class="value pos">Best of 5 sites</div></div>
    </div>

    <div class="section-title">akijair.com vs. Competitor Sites</div>
    <div class="section-sub">Gold = akijair.com, ranked within each measured dimension</div>
    <div class="chartwrap">${renderAuditChart()}</div>

    <div class="section-title">Critical: Unoptimized Hero Images (biggest fixable issue)</div>
    <div class="callout warn">
      <span class="tag">Finding</span>
      <p>The homepage marks four full-resolution destination banner images as <span class="mono">rel="preload"</span> — meaning the browser is told to fetch them immediately, before they're even needed. Measured sizes: <b>Kuala Lumpur 1.63 MB</b>, <b>Bangkok 1.01 MB</b>, <b>Guangzhou 0.82 MB</b>, <b>Kathmandu 0.63 MB</b> — over <b>4.1 MB</b> of eager image weight on top of the 497 KB page itself. On typical Bangladesh mobile data this is a slow, expensive first load, and it directly hurts Largest Contentful Paint (a Google ranking factor).</p>
    </div>
    <p style="font-size:14px; color:#DCE3EC; line-height:1.6;"><b>Fix:</b> Re-encode these as compressed WebP/AVIF at the actual display resolution (a hero banner rarely needs to exceed ~200–300 KB), serve responsive <span class="mono">srcset</span> sizes for mobile vs. desktop, and drop the eager <span class="mono">preload</span> hint on any image below the fold or in a carousel that isn't the very first visible frame.</p>

    <div class="section-title">High: Zero Social Sharing / Search Rich-Snippet Markup</div>
    <div class="callout warn">
      <span class="tag">Finding</span>
      <p>akijair.com has <b>no Open Graph tags</b> (<span class="mono">og:title</span>, <span class="mono">og:description</span>, <span class="mono">og:image</span>) and <b>no JSON-LD structured data</b> anywhere on the homepage. ShareTrip, by contrast, ships 8 Open Graph tags and 8 JSON-LD blocks — Amy ships 5 Open Graph tags. In practice this means: a link to akijair.com shared on Facebook or WhatsApp (a primary discovery channel in Bangladesh) shows no image/title preview card, and the site is not eligible for Google rich snippets (star ratings, price ranges, FAQ dropdowns) that ShareTrip can already win.</p>
    </div>
    <p style="font-size:14px; color:#DCE3EC; line-height:1.6;"><b>Fix:</b> Add Open Graph + Twitter Card meta tags to every page (home, flights, holiday packages) with a real image, and add JSON-LD <span class="mono">TravelAgency</span>/<span class="mono">Organization</span> schema plus <span class="mono">Product</span>/<span class="mono">Offer</span> schema on holiday package pages. This is a same-content, markup-only change — no redesign required, and it directly closes the gap to ShareTrip's biggest measurable technical edge.</p>

    <div class="section-title">Medium: Missing robots.txt, No Canonical Tags</div>
    <div class="callout">
      <span class="tag">Finding</span>
      <p><span class="mono">akijair.com/robots.txt</span> returns a 404, even though <span class="mono">/sitemap.xml</span> exists and returns 200 — the sitemap isn't being advertised to crawlers the standard way. No <span class="mono">&lt;link rel="canonical"&gt;</span> tag was found on the homepage either.</p>
    </div>
    <p style="font-size:14px; color:#DCE3EC; line-height:1.6;"><b>Fix:</b> Add a robots.txt that references the existing sitemap, and add self-referencing canonical tags site-wide — both are quick, low-risk technical SEO fixes.</p>

    <div class="section-title">Medium: Homepage Not Cacheable</div>
    <div class="callout">
      <span class="tag">Finding</span>
      <p>Every response (including this anonymous homepage load) sends <span class="mono">Cache-Control: private, no-cache, no-store, must-revalidate</span> and sets NextAuth session cookies even for visitors who never sign in. That forces a full server round-trip on every single visit and repeat view, with no CDN/browser caching benefit — ShareTrip's homepage has the identical pattern, so this isn't a competitive disadvantage today, but it is still avoidable cost and latency.</p>
    </div>
    <p style="font-size:14px; color:#DCE3EC; line-height:1.6;"><b>Fix:</b> Confirm whether the auth cookie needs to be issued on an anonymous homepage visit at all; if not, let the static shell be cached (even a short 60–300s edge cache) while keeping the booking/search flow dynamic.</p>

    <div class="section-title">Strength Worth Keeping: Security Headers</div>
    <div class="callout ok">
      <span class="tag">Finding — genuinely ahead</span>
      <p>akijair.com sends HSTS with <span class="mono">preload</span> and <span class="mono">includeSubDomains</span>, <span class="mono">X-Frame-Options: DENY</span> (the strongest clickjacking setting), <span class="mono">X-Content-Type-Options: nosniff</span>, and a real <span class="mono">Permissions-Policy</span>. Measured side-by-side, this is the strongest security header posture of all five sites audited — ShareTrip's X-Frame-Options uses the deprecated <span class="mono">ALLOW-FROM</span> directive (ignored by modern browsers, effectively no protection), GoZayaan ships a Content-Security-Policy that allows <span class="mono">unsafe-inline</span>/<span class="mono">unsafe-eval</span> and wildcard sources everywhere (largely non-functional as a real control), and Triplover sent none of these headers at all in this check.</p>
      <p>The one gap: no Content-Security-Policy on akijair.com. Adding a real (not wildcarded) CSP would make it the clear best-in-class on this dimension outright.</p>
    </div>

    <div class="section-title">Trust Signals</div>
    <div class="callout warn">
      <span class="tag">Finding</span>
      <p>No IATA, ATAB, or TOAB certification badge is visibly displayed on the akijair.com homepage. This is notable because AASL's own financial ledger (Group VIII) shows real IATA BSP settlement activity — meaning the credential likely exists operationally but isn't being used as a trust signal on the public site, unlike Amy which explicitly markets its IATA/ATAB/TOAB recognition.</p>
    </div>
    <p style="font-size:14px; color:#DCE3EC; line-height:1.6;"><b>Fix:</b> If AASL holds IATA/ATAB/TOAB accreditation (confirm with the operations team), display it prominently — a logo badge near the booking form and in the footer is a low-cost, high-trust conversion signal that most competitors also under-utilize.</p>

    <p class="footnote">
      Method: HTTP response headers and page source fetched directly from akijair.com, sharetrip.net, gozayaan.com, amybd.com, and triplover.com on 2026-07-06 via curl and a full page render. Booking-engine breadth scores are drawn from the public competitor research in Group XI. GoZayaan's homepage document (10.5 KB) is a thin client-rendered shell — its real payload weight likely shifts to JavaScript bundles loaded after initial paint, so its "weight" score reflects only the initial HTML document, not full page weight.
    </p>
  `;
}
