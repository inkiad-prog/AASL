function fyKey(period){
  const [y,m] = period.split('-').map(Number);
  return m>=7 ? `FY${y+1}` : `FY${y}`;
}
function num(v, d){ const n = Number(v); return isNaN(n) ? (d||0) : n; }
function pick(liveArr, fallbackArr){ return (Array.isArray(liveArr) && liveArr.length) ? liveArr : fallbackArr; }
function stats(arr){
  const n = arr.length || 1;
  const mean = arr.reduce((a,b)=>a+b,0)/n;
  const variance = arr.reduce((a,b)=>a+Math.pow(b-mean,2),0)/n;
  const sd = Math.sqrt(variance);
  return {mean, sd, cov: mean!==0 ? Math.abs(sd/mean) : null};
}
function computeFY(monthlyArr){

    return {period:r.period, clean_revenue, wallet_mechanic, total_expense, other_income, net_result,

}

async function loadLiveData(){
  const badge = document.getElementById('liveStatus');
  try{
    const res = await fetch('/api/aasl-data');
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    LIVE = data;
    if(Array.isArray(data.monthly) && data.monthly.length){
      monthly = deriveMonthlyFromLive(data.monthly);
      fy = computeFY(monthly);
    }
    if(badge) badge.textContent = 'LIVE · synced ' + new Date(data.meta.generatedAt).toLocaleString();
    go(currentGroupId);
  }catch(e){
    if(badge) badge.textContent = 'STATIC SNAPSHOT · DB unreachable';
    console.error('Live data fetch failed, showing static snapshot', e);
  }

function fmt(n){
  const v = Math.round(n);
  const s = Math.abs(v).toLocaleString('en-US');
  return (v<0? '('+s+')' : s);
}
function cls(n){ return n<0 ? 'neg' : (n>0?'pos':''); }

function renderNav(activeId){
  const nav = document.getElementById('nav');
  let lastSegment = null;
  nav.innerHTML = groups.map(g=>{
    let prefix = '';
    if(g.segment !== lastSegment){
      prefix = `<div class="segment-label" style="${lastSegment?'margin-top:18px;':''}">${g.segment}</div>`;
      lastSegment = g.segment;
    }
    const disabled = g.status==='pending' ? 'disabled' : '';
    const active = g.id===activeId ? 'active' : '';
    return `${prefix}<div class="navitem ${active} ${disabled}" onclick="${g.status==='done'?`go(${g.id})`:''}">
      <span class="num">${g.roman}</span>
      <span>${g.title}${g.status==='pending'?' — pending':''}</span>
    </div>`;
  }).join('');
}

function renderChart(){
  const w=1080, h=260, padL=50, padB=26, padT=10;
  const vals = monthly.map(r=>r.net_result);
  const max = Math.max(...vals, 0);
  const min = Math.min(...vals, 0);
  const range = max-min || 1;
  const barW = (w-padL-20)/monthly.length;
  const zeroY = padT + (max/range)*(h-padT-padB);

  let bars = monthly.map((r,i)=>{
    const x = padL + i*barW;
    const barH = Math.abs(r.net_result)/range*(h-padT-padB);
    const y = r.net_result>=0 ? zeroY-barH : zeroY;
    const color = r.net_result>=0 ? '#7FBF98' : '#A5432F';
    return `<rect x="${x+1}" y="${y}" width="${barW-2}" height="${Math.max(barH,1)}" fill="${color}" opacity="0.85"/>`;
  }).join('');

  let labels = monthly.map((r,i)=>{
    if(i%3!==0) return '';
    const x = padL + i*barW + barW/2;
    return `<text x="${x}" y="${h-8}" font-size="9" fill="#8FA1B8" text-anchor="middle">${r.period.slice(2)}</text>`;
  }).join('');

  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}">
    <line x1="${padL}" y1="${zeroY}" x2="${w-10}" y2="${zeroY}" stroke="#B8933F" stroke-width="1"/>
    ${bars}
    ${labels}
    <text x="${padL}" y="14" font-size="10" fill="#8FA1B8">Monthly Net Result (BDT), Feb 2024 — Jul 2026</text>
  </svg>`;
}

const STRATEGY_SEGMENTS = [
  {key:'b2b', label:'B2B — Agent Network'},
  {key:'b2c', label:'B2C — Consumer App'},
  {key:'holidays', label:'Holidays & Umrah'},
  {key:'visa', label:'Visa Services'},
  {key:'wallet', label:'Wallet / Fintech'},
];
// Directional 0–5 scores from public sources (see footnote) — not verified market-share data.
const STRATEGY_SCORES = {
  AASL:      {b2b:4, b2c:1, holidays:3, visa:2, wallet:2},
  ShareTrip: {b2b:5, b2c:5, holidays:4, visa:3, wallet:3},

  Triplover: {b2b:4, b2c:3, holidays:4, visa:3, wallet:2},
};
const STRAT_ACCENT = '#B8933F';
const STRAT_MUTED = '#4A7FB5';

function renderStrategyPanel(segLabel, scores){
  const w = 360, barH = 18, gap = 8, padL = 92, padR = 34, padT = 6;
  const maxW = w - padL - padR;
  const rows = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const h = padT*2 + rows.length*(barH+gap) - gap;
  const bars = rows.map(([name,score],i)=>{
    const y = padT + i*(barH+gap);
    const bw = Math.max((score/5)*maxW, 3);
    const isAASL = name==='AASL';
    const color = isAASL ? STRAT_ACCENT : STRAT_MUTED;
    return `
      <text x="${padL-10}" y="${y+barH/2+4}" text-anchor="end" font-size="11" fill="${isAASL?'#F4F2ED':'#8FA1B8'}" font-weight="${isAASL?'bold':'normal'}">${name}</text>
      <rect x="${padL}" y="${y}" width="${bw}" height="${barH}" rx="4" fill="${color}" opacity="${isAASL?1:0.8}"/>
      <text x="${padL+bw+8}" y="${y+barH/2+4}" font-size="11" fill="#8FA1B8">${score}/5</text>
    `;
  }).join('');
  return `<div style="flex:1 1 300px; min-width:280px;">
    <div style="font-family:'Courier New',monospace; font-size:11px; letter-spacing:1px; color:#B8933F; text-transform:uppercase; margin-bottom:8px;">${segLabel}</div>
    <svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}">${bars}</svg>
  </div>`;
}

function renderStrategyChart(){
  const panels = STRATEGY_SEGMENTS.map(seg=>{
    const scores = {};
    Object.keys(STRATEGY_SCORES).forEach(company=>{ scores[company] = STRATEGY_SCORES[company][seg.key]; });
    return renderStrategyPanel(seg.label, scores);
  }).join('');
  return `
    <div style="display:flex; align-items:center; gap:20px; margin-bottom:16px; font-size:12px; color:#DCE3EC; flex-wrap:wrap;">
      <span style="display:flex; align-items:center; gap:6px;"><span style="width:12px;height:12px;border-radius:3px;background:${STRAT_ACCENT};display:inline-block;"></span> AASL (subject of this analysis)</span>
      <span style="display:flex; align-items:center; gap:6px;"><span style="width:12px;height:12px;border-radius:3px;background:${STRAT_MUTED};display:inline-block;opacity:.8;"></span> Competitors — ShareTrip, GoZayaan, Amy, Triplover</span>
    </div>
    <div style="display:flex; flex-wrap:wrap; gap:28px 32px;">${panels}</div>
  `;
}

function renderAttackChart(){
  const w = 720, barH = 22, gap = 10, padL = 8, padR = 60, padT = 10, labelH = 16;
  const maxScore = 10;
  const rows = ATTACK_PLAN.slice().sort((a,b)=>b.priority-a.priority);
  const rowUnit = barH + labelH + gap;
  const h = padT*2 + rows.length*rowUnit;
  const maxW = w - padL - padR;
  const bars = rows.map((r,i)=>{
    const y = padT + i*rowUnit;
    const bw = Math.max((r.priority/maxScore)*maxW, 4);
    return `
      <text x="${padL}" y="${y+labelH-4}" font-size="12" fill="#F4F2ED" font-weight="bold">${r.competitor}</text>
      <text x="${padL+130}" y="${y+labelH-4}" font-size="11" fill="#8FA1B8">${r.vector}</text>
      <rect x="${padL}" y="${y+labelH}" width="${bw}" height="${barH}" rx="4" fill="${STRAT_ACCENT}" opacity="${0.55 + 0.45*(r.priority/maxScore)}"/>
      <text x="${padL+bw+8}" y="${y+labelH+barH/2+4}" font-size="12" fill="#DCE3EC" font-weight="bold">${r.priority}/10</text>
