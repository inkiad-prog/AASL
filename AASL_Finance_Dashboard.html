<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AASL — Finance Segment Analysis</title>
<style>
  :root{
    --navy:#0B1F3A;
    --navy-deep:#071527;
    --paper:#F4F2ED;
    --ink:#1B2430;
    --gold:#B8933F;
    --red:#A5432F;
    --green:#3F6B4D;
    --line:#26374F;
    --muted:#8FA1B8;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--navy-deep); color:var(--paper);
    font-family:'Iowan Old Style','Palatino Linotype',Georgia,serif;
    overflow:hidden;
  }
  .mono{font-family:'Courier New',ui-monospace,monospace;}
  .app{display:grid; grid-template-columns:270px 1fr; height:100vh; transition:grid-template-columns .25s ease;}
  .app.collapsed{grid-template-columns:0px 1fr;}
  .side{
    background:var(--navy); border-right:1px solid var(--line);
    padding:28px 0; overflow-y:auto; overflow-x:hidden; height:100vh;
    transition:padding .25s ease;
  }
  .app.collapsed .side{padding-left:0; padding-right:0; border-right:none; overflow:hidden;}

  .toggle-btn{
    position:fixed; top:20px; left:266px; z-index:50;
    width:28px; height:28px; border-radius:50%;
    background:var(--navy); border:1px solid var(--gold);
    color:var(--gold); display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:13px; transition:left .25s ease;
    box-shadow:0 2px 6px rgba(0,0,0,0.4);
  }
  .toggle-btn:hover{background:var(--gold); color:var(--navy-deep);}
  .app.collapsed .toggle-btn{left:12px;}
  .brand{padding:0 24px 20px; border-bottom:1px solid var(--line); margin-bottom:14px;}
  .brand .name{font-size:20px; letter-spacing:.5px;}
  .brand .sub{font-family:'Courier New',monospace; font-size:10.5px; color:var(--muted); margin-top:4px; letter-spacing:.5px;}
  .segment-label{
    font-family:'Courier New',monospace; font-size:10px; letter-spacing:2px;
    color:var(--gold); padding:16px 24px 8px; text-transform:uppercase;
  }
  .navitem{
    display:flex; gap:12px; align-items:flex-start;
    padding:10px 24px; cursor:pointer; font-size:14px; color:var(--muted);
    border-left:3px solid transparent; line-height:1.4;
  }
  .navitem span:last-child{white-space:normal; word-wrap:break-word;}
  .navitem .num{font-family:'Courier New',monospace; font-size:11px; color:var(--line); min-width:22px; flex-shrink:0;}
  .navitem:hover{background:rgba(184,147,63,0.06); color:var(--paper);}
  .navitem.active{
    background:rgba(184,147,63,0.1); color:var(--paper);
    border-left:3px solid var(--gold);
  }
  .navitem.active .num{color:var(--gold);}
  .navitem.disabled{opacity:.35; cursor:default;}
  .navitem.disabled:hover{background:none; color:var(--muted);}

  .main{height:100vh; overflow-y:auto; padding:48px 56px 100px;}
  .main-inner{max-width:920px; margin:0 auto;}
  .pagehead{border-bottom:2px solid var(--gold); padding-bottom:18px; margin-bottom:32px;}
  .eyebrow{font-family:'Courier New',monospace; font-size:11px; letter-spacing:2px; color:var(--gold); text-transform:uppercase;}
  h1{font-size:32px; margin:8px 0 6px; font-weight:500; line-height:1.15;}
  .entity{color:var(--muted); font-size:14px;}

  .callout{
    border:1px solid var(--line); background:rgba(255,255,255,0.02);
    padding:18px 20px; margin:20px 0; border-radius:3px;
  }
  .callout.warn{border-color:var(--red); background:rgba(165,67,47,0.08);}
  .callout.ok{border-color:var(--green); background:rgba(63,107,77,0.08);}
  .callout .tag{font-family:'Courier New',monospace; font-size:10.5px; letter-spacing:1.5px; text-transform:uppercase; color:var(--gold); margin-bottom:8px; display:block;}
  .callout.warn .tag{color:#D98A6F;}
  .callout.ok .tag{color:#7FBF98;}
  .callout p{margin:6px 0; font-size:14.5px; line-height:1.65; color:#DCE3EC;}

  .tablewrap{overflow-x:auto; margin:16px 0 30px; border:1px solid var(--line);}
  table{width:100%; border-collapse:collapse; font-size:13px; min-width:480px;}
  th{
    font-family:'Courier New',monospace; font-size:10.5px; letter-spacing:1px;
    text-transform:uppercase; color:var(--gold); text-align:right; padding:10px 14px;
    border-bottom:1px solid var(--gold); white-space:nowrap;
  }
  th:first-child{text-align:left;}
  td{padding:8px 14px; text-align:right; border-bottom:1px solid var(--line); font-family:'Courier New',monospace; font-size:12.5px; color:#DCE3EC; white-space:nowrap;}
  td:first-child{text-align:left; font-family:'Iowan Old Style',Georgia,serif; font-size:13px; white-space:normal;}
  tr:hover td{background:rgba(255,255,255,0.03);}
  .neg{color:#D98A6F;}
  .pos{color:#7FBF98;}
  .fy-row td{background:rgba(184,147,63,0.08); font-weight:bold; border-top:1px solid var(--gold);}

  .section-title{font-size:18px; margin:36px 0 8px; color:var(--paper); border-left:3px solid var(--gold); padding-left:12px;}
  .section-sub{color:var(--muted); font-size:13px; margin:0 0 16px 15px;}

  .chartwrap{border:1px solid var(--line); padding:24px; margin:18px 0 32px; background:rgba(255,255,255,0.015); overflow-x:auto;}
  svg text{font-family:'Courier New',monospace;}

  .placeholder{
    text-align:center; padding:90px 20px; color:var(--muted);
    border:1px dashed var(--line); margin-top:30px;
  }
  .placeholder .big{font-family:'Courier New',monospace; font-size:13px; letter-spacing:2px; color:var(--gold); margin-bottom:10px;}

  .footnote{font-size:11.5px; color:var(--muted); margin-top:30px; padding-top:16px; border-top:1px solid var(--line); line-height:1.6;}
  .kpi-row{display:grid; grid-template-columns:repeat(auto-fit, minmax(190px, 1fr)); gap:16px; margin:22px 0 12px;}
  .kpi{border:1px solid var(--line); padding:16px 20px; background:rgba(255,255,255,0.02);}
  .kpi .label{font-family:'Courier New',monospace; font-size:10px; letter-spacing:1px; color:var(--muted); text-transform:uppercase;}
  .kpi .value{font-size:23px; margin-top:8px; font-family:'Courier New',monospace;}

  ::-webkit-scrollbar{width:10px; height:10px;}
  ::-webkit-scrollbar-track{background:var(--navy-deep);}
  ::-webkit-scrollbar-thumb{background:var(--line); border-radius:5px;}
  ::-webkit-scrollbar-thumb:hover{background:var(--gold);}

  @media (max-width: 860px){
    .app{grid-template-columns:1fr; height:auto;}
    .side{height:auto; position:relative;}
    .main{height:auto; padding:32px 20px 80px;}
  }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="toggle-btn" id="toggleBtn" onclick="toggleSidebar()">&#8592;</div>

    <div class="brand">

  <div class="main"><div class="main-inner" id="main"></div></div>
</div>

function fyKey(period){
  const [y,m] = period.split('-').map(Number);
  return m>=7 ? `FY${y+1}` : `FY${y}`;
}
const fy = {};
monthly.forEach(r=>{
  const k = fyKey(r.period);
  fy[k] = fy[k] || {clean_revenue:0,total_expense:0,net_result:0};
  fy[k].clean_revenue += r.clean_revenue;
  fy[k].total_expense += r.total_expense;
  fy[k].net_result += r.net_result;
});

function fmt(n){
  const v = Math.round(n);
  const s = Math.abs(v).toLocaleString('en-US');
  return (v<0? '('+s+')' : s);
}
function cls(n){ return n<0 ? 'neg' : (n>0?'pos':''); }

function renderNav(activeId){
  const nav = document.getElementById('nav');
  nav.innerHTML = groups.map(g=>{
    const disabled = g.status==='pending' ? 'disabled' : '';
    const active = g.id===activeId ? 'active' : '';
    return `<div class="navitem ${active} ${disabled}" onclick="${g.status==='done'?`go(${g.id})`:''}">
      <span class="num">${g.roman}</span>
      <span>${g.title}${g.status==='pending'?' — pending':''}</span>
    </div>`;
  }).join('');
}

function renderChart(){
  const w=1080, h=260, padL=50, padB=26, padT=10;
  const vals = monthly.map(r=>r.net_result);
  const max = Math.max(...vals, 0);
  const min = Math.min(...vals, 0);
  const range = max-min || 1;
  const barW = (w-padL-20)/monthly.length;
  const zeroY = padT + (max/range)*(h-padT-padB);

  let bars = monthly.map((r,i)=>{
    const x = padL + i*barW;
    const barH = Math.abs(r.net_result)/range*(h-padT-padB);
    const y = r.net_result>=0 ? zeroY-barH : zeroY;
    const color = r.net_result>=0 ? '#7FBF98' : '#A5432F';
    return `<rect x="${x+1}" y="${y}" width="${barW-2}" height="${Math.max(barH,1)}" fill="${color}" opacity="0.85"/>`;
  }).join('');

  let labels = monthly.map((r,i)=>{
    if(i%3!==0) return '';
    const x = padL + i*barW + barW/2;
    return `<text x="${x}" y="${h-8}" font-size="9" fill="#8FA1B8" text-anchor="middle">${r.period.slice(2)}</text>`;
  }).join('');

  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}">
    <line x1="${padL}" y1="${zeroY}" x2="${w-10}" y2="${zeroY}" stroke="#B8933F" stroke-width="1"/>
    ${bars}
    ${labels}
    <text x="${padL}" y="14" font-size="10" fill="#8FA1B8">Monthly Net Result (BDT), Feb 2024 — Jul 2026</text>
  </svg>`;
}
